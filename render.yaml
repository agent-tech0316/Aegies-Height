services:
  - type: web
    name: agentech-mujoco-simulator
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.simulator
    healthCheckPath: /health
    envVars:
      - key: MUJOCO_GL
        value: egl
      - key: AGENTECH_SIMULATOR_ALLOWED_ORIGINS
        value: https://www.agent-tech.ai,https://agent-tech.ai,http://localhost:3000
